name: Migration CI and Schema Drift

on:
  pull_request:
    branches: [main]
    paths:
      - 'supabase/migrations/**'
      - 'supabase/tests/**'
      - 'supabase/config.toml'
      - 'scripts/check-migration-governance.sh'
      - '.github/workflows/migration-ci.yml'
  push:
    branches: [main]
    paths:
      - 'supabase/migrations/**'
      - 'supabase/tests/**'
      - 'supabase/config.toml'
      - 'scripts/check-migration-governance.sh'
      - '.github/workflows/migration-ci.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: migration-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  static-governance:
    name: Migration naming, safety and contract tests
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate shell syntax
        run: bash -n scripts/check-migration-governance.sh

      - name: Enforce migration governance
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            bash scripts/check-migration-governance.sh "origin/${{ github.base_ref }}"
          elif git rev-parse HEAD^ >/dev/null 2>&1; then
            bash scripts/check-migration-governance.sh HEAD^
          else
            bash scripts/check-migration-governance.sh
          fi

  clean-replay:
    name: Clean database replay and pgTAP contracts
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: static-governance
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pinned Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: 2.101.0

      - name: Start local Supabase stack
        id: start
        shell: bash
        run: |
          if ! supabase start > /tmp/supabase-start.log 2>&1; then
            echo 'Supabase startup failed.'
            exit 1
          fi
          echo 'Supabase local stack started.'

      - name: Upload startup diagnostics
        if: failure() && steps.start.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: supabase-startup-diagnostics
          path: /tmp/supabase-start.log
          if-no-files-found: error
          retention-days: 7

      - name: Replay every migration from zero
        run: supabase db reset --local

      - name: Run database contract tests
        run: supabase test db

      - name: Run database lint
        run: supabase db lint --local --level warning

      - name: Stop local stack
        if: always()
        run: supabase stop --no-backup >/dev/null 2>&1 || true
